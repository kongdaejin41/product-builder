<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-toggle-container">
            <button id="theme-toggle-btn">Toggle Dark/Light Mode</button>
        </div>
        <h1>Lotto Number Generator</h1>
        <div id="numbers" class="numbers-container"></div>
        <button id="generate-btn">Generate Numbers</button>

        <hr class="divider">

        <section class="contact-section">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/mvzdrvay" method="POST" id="contact-form">
                <div class="form-group">
                    <label for="email">Your Email</label>
                    <input type="email" name="email" id="email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea name="message" id="message" rows="4" placeholder="How can we help you?" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </section>

        <hr class="divider">

        <section class="comments-section">
            <div id="disqus_thread"></div>
            <script>
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://product-builder-iihodrvhxy.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
